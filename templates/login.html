<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zkw 工作室 - 用户登录</title>
    <!-- 引入 Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            /* 深色渐变背景 */
            background: linear-gradient(135deg, #1e1e2e 0%, #2b2b40 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            color: white;
            margin: 0;
        }
        .login-card {
            /* 毛玻璃效果 */
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h3 {
            font-weight: 700;
            color: #89b4fa; /* zkw 主题蓝 */
            margin-bottom: 5px;
        }
        .login-header p {
            color: #a6adc8;
            font-size: 0.9em;
        }
        .form-control {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px;
            border-radius: 8px;
        }
        .form-control:focus {
            background: rgba(0, 0, 0, 0.3);
            border-color: #89b4fa;
            color: white;
            box-shadow: 0 0 0 0.25rem rgba(137, 180, 250, 0.25);
        }
        .form-control::placeholder {
            color: #6c757d;
        }
        .btn-login {
            background: #89b4fa;
            border: none;
            color: #11111b;
            font-weight: 700;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            margin-top: 10px;
            transition: all 0.3s ease;
        }
        .btn-login:hover {
            background: #b4befe;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(137, 180, 250, 0.3);
        }
        .register-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9em;
            color: #a6adc8;
        }
        .register-link a {
            color: #89b4fa;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        .register-link a:hover {
            color: #b4befe;
            text-decoration: underline;
        }
        /* 移除了 admin-hint 样式，因为不再需要 */
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <h3>🌊 zkw 工作室</h3>
            <p>全能服务器管理平台</p>
        </div>
        
        <form onsubmit="event.preventDefault(); login();">
            <div class="mb-3">
                <label for="username" class="form-label visually-hidden">用户名</label>
                <input type="text" class="form-control" id="username" placeholder="请输入用户名" required autocomplete="username">
            </div>
            <div class="mb-4">
                <label for="password" class="form-label visually-hidden">密码</label>
                <input type="password" class="form-control" id="password" placeholder="请输入密码" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-login" id="login-btn">
                立即登录
            </button>
        </form>

        <!-- 错误提示区域 -->
        <div id="error-msg" class="text-center text-danger mt-3 fw-bold" style="display: none;"></div>

        <!-- 注册入口 -->
        <div class="register-link">
            没有账号？<a href="/register_page">点击这里注册 ➤</a>
        </div>
        
        <!-- ⚠️ 已移除管理员密码提示，确保安全 -->
    </div>

    <script>
        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-msg');
            const btn = document.getElementById('login-btn');

            // 重置状态
            errorDiv.style.display = 'none';
            errorDiv.innerText = '';
            btn.disabled = true;
            btn.innerText = '登录中...';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, password: password })
                });
                const data = await response.json();

                if (data.success) {
                    // 登录成功，跳转首页
                    btn.innerText = '✅ 登录成功';
                    btn.classList.replace('btn-login', 'btn-success');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 800);
                } else {
                    // 登录失败
                    errorDiv.innerText = data.msg;
                    errorDiv.style.display = 'block';
                    btn.disabled = false;
                    btn.innerText = '立即登录';
                }
            } catch (error) {
                console.error('Error:', error);
                errorDiv.innerText = '网络错误，请稍后重试';
                errorDiv.style.display = 'block';
                btn.disabled = false;
                btn.innerText = '立即登录';
            }
        }
    </script>
</body>
</html>
