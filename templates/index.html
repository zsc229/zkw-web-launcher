<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>zkw 工作室 - 全能控制台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; }
        .sidebar { background: #1e1e2e; color: white; min-height: 100vh; padding: 20px; }
        .console-box { background: #111; color: #0f0; font-family: 'Consolas', monospace; height: 300px; overflow-y: scroll; padding: 10px; border-radius: 5px; }
        .stat-card { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .log-entry { margin: 0; font-size: 12px; line-height: 1.4; }
        .log-error { color: #ff5555; }
        .log-warn { color: #ffaa00; }
        .core-item { background: #fff; border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
        .core-item.active { border-color: #28a745; background-color: #e8f5e9; }
        .upload-area { border: 2px dashed #ccc; padding: 20px; text-align: center; background: #fff; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .upload-area:hover { border-color: #0d6efd; background: #f8f9fa; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- 侧边栏 -->
        <div class="col-md-2 sidebar">
            <h4>🌊 zkw 工作室</h4>
            <hr>
            <p>👤 <span id="disp-user"></span></p>
            <p>💰 <span id="disp-points" class="text-warning"></span></p>
            <p>📅 <span id="disp-expiry"></span></p>
            <hr>
            <button onclick="logout()" class="btn btn-outline-light btn-sm w-100">退出登录</button>
        </div>

        <!-- 主内容 -->
        <div class="col-md-10 p-4">
            
            <!-- 顶部状态与操作 -->
            <div class="row mb-4">
                <div class="col-md-3">
                    <div class="stat-card">
                        <h5>服务器状态</h5>
                        <h2 id="server-status" class="text-danger">已停止</h2>
                        <small id="running-core-name" class="text-muted"></small>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card">
                        <h5>每日签到</h5>
                        <button onclick="signin()" class="btn btn-primary w-100">📅 签到领积分</button>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card">
                        <h5>兑换码</h5>
                        <div class="input-group">
                            <input type="text" id="gift-code" class="form-control" placeholder="代码">
                            <button onclick="redeem()" class="btn btn-warning">兑换</button>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card">
                        <h5>续费 (10 分/天)</h5>
                        <div class="input-group">
                            <input type="number" id="renew-days" class="form-control" value="30">
                            <button onclick="renew()" class="btn btn-outline-primary">续费</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row">
                <!-- 左侧：核心管理与上传 -->
                <div class="col-md-5">
                    <div class="stat-card">
                        <h5>📂 核心文件管理</h5>
                        
                        <!-- 上传区域 -->
                        <div class="upload-area mb-3" onclick="document.getElementById('core-upload').click()">
                            <p class="mb-0 text-muted">点击选择 .jar 文件上传</p>
                            <input type="file" id="core-upload" accept=".jar" style="display: none" onchange="uploadCore(this)">
                            <div id="upload-progress" class="progress mt-2" style="height: 5px; display: none;">
                                <div class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%"></div>
                            </div>
                        </div>

                        <!-- 文件列表 -->
                        <div id="cores-list" style="max-height: 300px; overflow-y: auto;">
                            <p class="text-center text-muted">加载中...</p>
                        </div>
                    </div>
                </div>

                <!-- 右侧：控制台 -->
                <div class="col-md-7">
                    <div class="stat-card">
                        <h5>📜 实时控制台</h5>
                        <div id="console" class="console-box mb-3"></div>
                        <div class="input-group">
                            <input type="text" id="cmd-input" class="form-control" placeholder="输入指令 (如: op RZhengkaiwen)" disabled>
                            <button onclick="sendCmd()" class="btn btn-primary" id="btn-send-cmd" disabled>发送</button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    let eventSource = null;
    let cores = [];

    // 初始化
    async function init() {
        await loadInfo();
        await loadCores();
        checkStatus();
    }

    // 加载用户信息
    async function loadInfo() {
        const res = await fetch('/api/user_info');
        if(res.status === 401) { window.location.href = '/login_page'; return; }
        const data = await res.json();
        document.getElementById('disp-user').innerText = data.username;
        document.getElementById('disp-points').innerText = data.points + (data.is_admin ? ' (∞)' : '');
        document.getElementById('disp-expiry').innerText = data.is_admin ? '永久' : data.expiry;
    }

    // 加载核心列表
    async function loadCores() {
        const res = await fetch('/api/cores');
        cores = await res.json();
        const listDiv = document.getElementById('cores-list');
        listDiv.innerHTML = '';
        
        if (cores.length === 0) {
            listDiv.innerHTML = '<p class="text-center text-muted mt-3">暂无核心，请上传 .jar 文件</p>';
            return;
        }

        // 获取当前运行的核心
        const statusRes = await fetch('/api/status');
        const statusData = await statusRes.json();
        const runningCore = statusData.current_core;

        cores.forEach(core => {
            const isActive = core.name === runningCore;
            const div = document.createElement('div');
            div.className = `core-item ${isActive ? 'active' : ''}`;
            div.innerHTML = `
                <div>
                    <strong>${core.name}</strong>
                    <br><small class="text-muted">${core.size}</small>
                    ${isActive ? '<span class="badge bg-success ms-2">运行中</span>' : ''}
                </div>
                <div>
                    ${!isActive ? `<button class="btn btn-sm btn-success" onclick="startServer('${core.name}')">▶ 启动</button>` : ''}
                    ${!isActive ? `<button class="btn btn-sm btn-outline-danger ms-1" onclick="deleteCore('${core.name}')">🗑️</button>` : ''}
                    ${isActive ? `<button class="btn btn-sm btn-danger" onclick="stopServer()">⏹ 停止</button>` : ''}
                </div>
            `;
            listDiv.appendChild(div);
        });
        
        // 更新控制台输入框状态
        const cmdInput = document.getElementById('cmd-input');
        const btnSend = document.getElementById('btn-send-cmd');
        if (runningCore) {
            cmdInput.disabled = false;
            btnSend.disabled = false;
        } else {
            cmdInput.disabled = true;
            btnSend.disabled = true;
        }
    }

    // 上传核心
    function uploadCore(input) {
        const file = input.files[0];
        if (!file) return;
        if (!file.name.endsWith('.jar')) {
            alert('只能上传 .jar 文件！');
            return;
        }

        const formData = new FormData();
        formData.append('file', file);

        const progressBar = document.querySelector('#upload-progress .progress-bar');
        const progressContainer = document.getElementById('upload-progress');
        progressContainer.style.display = 'block';
        progressBar.style.width = '0%';

        const xhr = new XMLHttpRequest();
        xhr.open('POST', '/api/upload_core', true);
        
        xhr.upload.onprogress = function(e) {
            if (e.lengthComputable) {
                const percent = (e.loaded / e.total) * 100;
                progressBar.style.width = percent + '%';
            }
        };

        xhr.onload = function() {
            progressContainer.style.display = 'none';
            if (xhr.status === 200) {
                const res = JSON.parse(xhr.responseText);
                if (res.success) {
                    alert(res.msg);
                    loadCores(); // 刷新列表
                } else {
                    alert('上传失败：' + res.msg);
                }
            } else {
                alert('上传出错');
            }
            input.value = ''; // 清空选择
        };
        
        xhr.send(formData);
    }

    // 删除核心
    async function deleteCore(filename) {
        if(!confirm(`确定要删除 ${filename} 吗？`)) return;
        const res = await fetch('/api/delete_core', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({filename: filename})
        });
        const data = await res.json();
        alert(data.msg);
        if(data.success) loadCores();
    }

    // 启动服务器
    async function startServer(coreName) {
        const res = await fetch('/api/start', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({core: coreName})
        });
        const data = await res.json();
        alert(data.msg);
        if(data.success) {
            checkStatus();
            loadCores();
        }
    }

    // 停止服务器
    async function stopServer() {
        const res = await fetch('/api/stop', {method: 'POST'});
        const data = await res.json();
        alert(data.msg);
        if(data.success) checkStatus();
    }

    // 检查状态
    async function checkStatus() {
        const res = await fetch('/api/status');
        const data = await res.json();
        const statusEl = document.getElementById('server-status');
        const coreNameEl = document.getElementById('running-core-name');
        
        if(data.running) {
            statusEl.innerText = "运行中";
            statusEl.className = "text-success";
            coreNameEl.innerText = `核心：${data.current_core}`;
            if(!eventSource) startLogs();
        } else {
            statusEl.innerText = "已停止";
            statusEl.className = "text-danger";
            coreNameEl.innerText = "";
            if(eventSource) { eventSource.close(); eventSource = null; }
        }
        // 刷新列表以更新按钮状态
        loadCores(); 
    }

    // 启动日志监听
    function startLogs() {
        eventSource = new EventSource('/api/logs');
        eventSource.onmessage = function(e) {
            const logs = JSON.parse(e.data);
            const consoleDiv = document.getElementById('console');
            logs.forEach(log => {
                const p = document.createElement('p');
                p.className = 'log-entry';
                if(log.includes('ERROR')) p.className += ' log-error';
                if(log.includes('WARN')) p.className += ' log-warn';
                p.innerText = log;
                consoleDiv.appendChild(p);
            });
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        };
    }

    // 发送指令
    async function sendCmd() {
        const cmd = document.getElementById('cmd-input').value;
        if(!cmd) return;
        await fetch('/api/command', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({command: cmd})
        });
        document.getElementById('cmd-input').value = '';
    }

    // 签到
    async function signin() {
        const res = await fetch('/api/signin', {method: 'POST'});
        const data = await res.json();
        alert(data.msg);
        if(data.success) loadInfo();
    }

    // 兑换
    async function redeem() {
        const code = document.getElementById('gift-code').value;
        const res = await fetch('/api/redeem', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({code: code})
        });
        const data = await res.json();
        alert(data.msg);
        if(data.success) {
            document.getElementById('gift-code').value = '';
            loadInfo();
        }
    }

    // 续费
    async function renew() {
        const days = document.getElementById('renew-days').value;
        const res = await fetch('/api/renew', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({days: days})
        });
        const data = await res.json();
        alert(data.msg);
        if(data.success) loadInfo();
    }

    function logout() {
        window.location.href = '/api/logout';
    }

    // 定时刷新
    setInterval(checkStatus, 2000);
    init();
</script>
</body>
</html>
