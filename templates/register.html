<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zkw 工作室 - 用户注册</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e1e2e 0%, #2b2b40 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            color: white;
            margin: 0;
        }
        .register-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .register-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .register-header h3 {
            font-weight: 700;
            color: #4CAF50; /* 注册页用绿色 */
            margin-bottom: 5px;
        }
        .register-header p {
            color: #a6adc8;
            font-size: 0.9em;
        }
        .form-control {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px;
            border-radius: 8px;
        }
        .form-control:focus {
            background: rgba(0, 0, 0, 0.3);
            border-color: #4CAF50;
            color: white;
            box-shadow: 0 0 0 0.25rem rgba(76, 175, 80, 0.25);
        }
        .form-control::placeholder {
            color: #6c757d;
        }
        .btn-register {
            background: #4CAF50;
            border: none;
            color: white;
            font-weight: 700;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            margin-top: 10px;
            transition: all 0.3s ease;
        }
        .btn-register:hover {
            background: #66bb6a;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9em;
            color: #a6adc8;
        }
        .back-link a {
            color: #89b4fa;
            text-decoration: none;
            font-weight: 600;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
        #msg {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="register-header">
            <h3>📝 新用户注册</h3>
            <p>注册即送 <strong>200 积分</strong>！</p>
        </div>
        
        <form onsubmit="event.preventDefault(); register();">
            <div class="mb-3">
                <input type="text" class="form-control" id="username" placeholder="设置用户名 (不能包含特殊字符)" required>
            </div>
            <div class="mb-3">
                <input type="password" class="form-control" id="password" placeholder="设置密码" required>
            </div>
            <div class="mb-4">
                <input type="password" class="form-control" id="confirm_password" placeholder="确认密码" required>
            </div>
            
            <button type="submit" class="btn btn-register" id="reg-btn">立即注册</button>
        </form>

        <div id="msg"></div>

        <div class="back-link">
            已有账号？<a href="/login_page">返回登录 ➤</a>
        </div>
    </div>

    <script>
        async function register() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;
            const msgDiv = document.getElementById('msg');
            const btn = document.getElementById('reg-btn');

            // 基础验证
            if (!username || !password) {
                msgDiv.innerText = "❌ 用户名和密码不能为空";
                msgDiv.className = "text-danger";
                return;
            }
            if (password !== confirm) {
                msgDiv.innerText = "❌ 两次输入的密码不一致";
                msgDiv.className = "text-danger";
                return;
            }

            // 锁定按钮
            btn.disabled = true;
            btn.innerText = "注册中...";
            msgDiv.innerText = "";

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, password: password })
                });
                const data = await response.json();

                if (data.success) {
                    msgDiv.innerText = "✅ " + data.msg + " (即将跳转登录...)";
                    msgDiv.className = "text-success";
                    // 2 秒后跳转到登录页
                    setTimeout(() => {
                        window.location.href = '/login_page';
                    }, 2000);
                } else {
                    msgDiv.innerText = "❌ " + data.msg;
                    msgDiv.className = "text-danger";
                    btn.disabled = false;
                    btn.innerText = "立即注册";
                }
            } catch (error) {
                msgDiv.innerText = "❌ 网络错误，请稍后重试";
                msgDiv.className = "text-danger";
                btn.disabled = false;
                btn.innerText = "立即注册";
            }
        }
    </script>
</body>
</html>
